services:
  postgres:
    image: postgres:16-alpine
    container_name: books-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booksdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: ./app
    container_name: books-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/booksdb
      PORT: 3000
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres-data:
